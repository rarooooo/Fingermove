<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FingerMove – التحكم المطور</title>
  <style>
    body { font-family: sans-serif; background: #2a5298; color: white; text-align: center; padding-top: 50px; }
    .btn-group { margin-top: 20px; }
    button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; border: none; margin: 10px; }
    .connect { background: #4CAF50; color: white; }
    .action { background: #ff9800; color: white; }
    #status { margin-top: 20px; color: #ffeb3b; }
  </style>
</head>
<body>

  <h1>FingerMove Control</h1>
  <button class="connect" onclick="connectSerial()">اتصال بالأردوينو 🔌</button>
  
  <div class="btn-group">
    <button class="action" onclick="sendCommand('GRAB')">إمساك ✊</button>
    <button class="action" onclick="sendCommand('RELEASE')">إفلات 🖐️</button>
  </div>

  <p id="status">الحالة: غير متصل</p>

  <script>
    let port;
    let writer;

    async function connectSerial() {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        writer = port.writable.getWriter();
        document.getElementById('status').innerText = "الحالة: متصل بنجاح ✅";
      } catch (err) {
        console.error(err);
        alert("فشل الاتصال: تأكد من اختيار المنفذ الصحيح.");
      }
    }

    async function sendCommand(cmd) {
      if (!writer) {
        alert("يرجى الضغط على زر الاتصال أولاً!");
        return;
      }
      const data = new TextEncoder().encode(cmd + "\n");
      await writer.write(data);
    }
  </script>
</body>
</html>
