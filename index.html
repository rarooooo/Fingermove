<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تحكم في الإصبع</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    h1 {
      margin-bottom: 40px;
    }
    button {
      background: #ff9800;
      border: none;
      padding: 20px 40px;
      margin: 20px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #e68900;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>برنامج التحكم في الإصبع</h1>
  <button onclick="sendCommand('GRAB')">إمساك ✊</button>
  <button onclick="sendCommand('RELEASE')">إفلات 🖐️</button>

  <script>
    async function sendCommand(cmd) {
      // استخدام Web Serial API
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        const writer = port.writable.getWriter();
        const data = new TextEncoder().encode(cmd + "\n");
        await writer.write(data);
        writer.releaseLock();
      } catch (err) {
        alert("تأكد من أن المتصفح يدعم Web Serial (Chrome/Edge) وأن الأردوينو متصل.");
      }
    }
  </script>
</body>
</html>
